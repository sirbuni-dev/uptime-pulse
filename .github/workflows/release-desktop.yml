name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            label: Linux
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            label: macOS
          - platform: windows-latest
            args: ""
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Patch app version in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = '${{ inputs.version }}';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
            console.log('Patched version to ${{ inputs.version }}');
          "

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish to GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: desktop-v${{ inputs.version }}
          releaseName: "Uptime Pulse Desktop v${{ inputs.version }}"
          releaseBody: |
            ## Uptime Pulse Desktop v${{ inputs.version }}

            Native cross-platform uptime monitor — macOS, Windows, and Linux.
            No server or Docker required; data is stored locally in SQLite.

            ### Download

            | Platform | Installer |
            |----------|-----------|
            | **macOS** (Intel + Apple Silicon) | `.dmg` |
            | **Windows** | `.msi` (recommended) · `.exe` (NSIS) |
            | **Linux** | `.AppImage` (portable) · `.deb` (Debian/Ubuntu) |

            > **macOS note:** If Gatekeeper blocks the app, right-click → Open.
            > The release is unsigned; a signing certificate will be added in a future version.

            ---

            Full release notes: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
